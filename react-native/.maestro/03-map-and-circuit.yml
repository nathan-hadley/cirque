appId: com.nathanhadley.Cirque
name: Circuit entry, navigation, and map tap
---
- launchApp:
    clearState: true
- tapOn: "About"
- tapOn:
    id: circuit-card-forestland-black
# The problem detail is a native sheet; allow its present animation to finish.
- extendedWaitUntil:
    visible: "The Shallow"
    timeout: 10000
# Circuit navigation via the prev/next buttons
- tapOn:
    id: circuit-next-problem
- assertVisible: "Cube Crack"
- tapOn:
    id: circuit-next-problem
- assertVisible: "The Cube"
- tapOn:
    id: circuit-previous-problem
- assertVisible: "Cube Crack"
# Navigate by tapping the map instead of the buttons: dismiss the sheet, then
# tap the centered problem's marker to reopen it. Cube Crack is centered here.
#
# The sheet is a native bottom sheet dismissed by dragging its body below the
# smallest detent. Wait for the dismiss animation rather than asserting
# immediately.
- swipe:
    start: "50%, 60%"
    end: "50%, 98%"
    duration: 300
- extendedWaitUntil:
    notVisible: "Cube Crack"
    timeout: 8000
- tapOn:
    point: "50%, 24%"
- extendedWaitUntil:
    visible: "Cube Crack"
    timeout: 8000
